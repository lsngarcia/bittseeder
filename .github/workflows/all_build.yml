name: All Build

on:
  push:
    branches:
      - master

env:
  CARGO_TERM_COLOR: always

jobs:
  get_version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from previous branch or tag
        id: get_version
        shell: bash
        run: |
          # Try to get version from the previous branch name (when merging from release branches)
          PREV_BRANCH=$(git log -1 --pretty=%B | grep -oP 'Merge branch \'\K[^\']*' | head -1)

          if [[ "$PREV_BRANCH" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION=$PREV_BRANCH
          else
            # Try to get from git tags (latest tag)
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

            if [[ -z "$VERSION" ]]; then
              # Fallback to Cargo.toml version
              VERSION=$(grep '^version = ' Cargo.toml | head -1 | awk '{print $3}' | tr -d '"')
            fi
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

  build:
    name: Build on ${{ matrix.os }}
    needs: get_version
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            binary_ext: .bin
            binary_name: linux
            strip_command: strip
            upx_url: https://github.com/upx/upx/releases/download/v4.2.1/upx-4.2.1-amd64_linux.tar.xz
          - os: macos-latest
            binary_ext: .bin
            binary_name: macos
            strip_command: strip
            upx_url: https://github.com/upx/upx/releases/download/v4.2.1/upx-4.2.1-amd64_macos.tar.xz
          - os: windows-latest
            binary_ext: .exe
            binary_name: windows
            strip_command: strip
            upx_url: https://github.com/upx/upx/releases/download/v4.2.1/upx-4.2.1-win64.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Test project
        run: cargo test --all-features --verbose

      - name: Build project
        run: cargo build --release --verbose

      - name: Strip binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            "${{ matrix.strip_command }}" target/release/bittseeder.exe
          else
            "${{ matrix.strip_command }}" target/release/bittseeder
          fi

      - name: Download and install UPX
        shell: bash
        run: |
          cd /tmp
          if [ "${{ runner.os }}" = "Windows" ]; then
            curl -L "${{ matrix.upx_url }}" -o upx.zip
            unzip upx.zip -d upx
            echo "$PWD/upx" >> $GITHUB_PATH
          else
            curl -L "${{ matrix.upx_url }}" -o upx.tar.xz
            tar xf upx.tar.xz
            cd upx*
            chmod +x upx
            echo "$PWD" >> $GITHUB_PATH
          fi

      - name: Compress binary with UPX
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            upx --best --lzma target/release/bittseeder.exe
          else
            upx --best --lzma target/release/bittseeder
          fi

      - name: Rename binary with version
        shell: bash
        run: |
          VERSION="${{ needs.get_version.outputs.version }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/release/bittseeder.exe "bittseeder-${VERSION}-windows.exe"
          else
            cp target/release/bittseeder "bittseeder-${VERSION}-${{ matrix.binary_name }}${{ matrix.binary_ext }}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bittseeder-${{ matrix.binary_name }}${{ matrix.binary_ext }}
          path: bittseeder-*${{ matrix.binary_ext }}

  create_release:
    name: Create Draft Release
    needs: [get_version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Draft Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.get_version.outputs.version }}
          name: Release ${{ needs.get_version.outputs.version }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            ./artifacts/*/bittseeder-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
